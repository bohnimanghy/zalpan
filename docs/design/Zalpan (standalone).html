document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

      <div data-reveal=\"\" data-tilt=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .6s,transform .6s;background:var(--paper);padding:30px;\">\n        <div style=\"font-size:26px;margin-bottom:14px;\">🖥️<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:16px;margin-bottom:6px;\">Separate POS software<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:var(--muted);line-height:1.55;\">Billing lives in one silo, everything else somewhere else.<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-tilt=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .6s .05s,transform .6s .05s;background:var(--paper);padding:30px;\">\n        <div style=\"font-size:26px;margin-bottom:14px;\">📊<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:16px;margin-bottom:6px;\">Excel inventory<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:var(--muted);line-height:1.55;\">Spreadsheets that are out of date the moment service starts.<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-tilt=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .6s .1s,transform .6s .1s;background:var(--paper);padding:30px;\">\n        <div style=\"font-size:26px;margin-bottom:14px;\">📱<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:16px;margin-bottom:6px;\">WhatsApp orders<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:var(--muted);line-height:1.55;\">Orders scattered across chats, easy to miss during a rush.<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-tilt=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .6s .15s,transform .6s .15s;background:var(--paper);padding:30px;\">\n        <div style=\"font-size:26px;margin-bottom:14px;\">📜<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:16px;margin-bottom:6px;\">Paper KOT slips<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:var(--muted);line-height:1.55;\">Handwritten tickets that      <\u002Fdiv>\n      <div data-faq-list=\"\" style=\"border-top:1px solid var(--line);\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= FINAL CTA ================= -->\n  <section id=\"demo\" style=\"position:relative;background:var(--ink);color:#fff;overflow:hidden;\">\n    <div aria-hidden=\"true\" style=\"position:absolute;top:-30%;right:-10%;width:60%;height:160%;background:radial-gradient(circle at 50% 50%,rgba(240,83,28,0.35),transparent 62%);filter:blur(30px);\"><\u002Fdiv>\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .8s,transform .8s;position:relative;max-width:900px;margin:0 auto;padding:clamp(72px,9vw,130px) clamp(18px,4vw,40px);text-align:center;\">\n      <h2 style=\"font-family:'Baloo 2',cursive;font-weight:800;letter-spacing:-0.01em;font-size:clamp(38px,6.4vw,84px);line-height:0.94;margin:0 0 22px;text-wrap:balance;\">Ready to run your restaurant <span style=\"color:var(--or2);\">smarter?<\u002Fspan><\u002Fh2>\n      <p style=\"font-size:clamp(16px,1.8vw,20px);line-height:1.55;color:#C9BFB0;margin:0 auto 40px;max-width:56ch;\">Bring billing, kitchen, stock, customers, payments, and growth into one connected platform.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:14px;justify-content:center;\">\n        <a href=\"#demo\" style=\"display:inline-flex;align-items:center;gap:10px;background:var(--or);color:#fff;font-weight:600;font-size:16px;padding:17px 32px;border-radius:12px;text-decoration:none;box-shadow:0 16px 34px -14px rgba(240,83,28,0.8);transition:transform .15s;\" style-hover=\"transform:translateY(-2px);\">Book a Demo <span style=\"font-family:'IBM Plex Mono',monospace;\">→<\u002Fspan><\u002Fa>\n        <a href=\"#demo\" style=\"display:inline-flex;align-items:center;background:transparent;color:#fff;font-weight:600;font-size:16px;padding:17px 30px;border-radius:12px;text-decoration:none;border:1px solid rgba(255,255,255,0.25);transition:border-color .2s,transform .15s;\" style-hover=\"border-color:#fff;transform:translateY(-2px);\">Start Free Trial<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= FOOTER ================= -->\n  <footer style=\"background:var(--charcoal);color:#B5AC9E;border-top:1px solid rgba(255,255,255,0.08);\">\n    <div style=\"max-width:1280px;margin:0 auto;padding:44px clamp(18px,4vw,40px);display:flex;flex-wrap:wrap;gap:24px;align-items:center;justify-content:space-between;\">\n      <div style=\"display:flex;align-items:center;gap:11px;\">\n        <span style=\"width:34px;height:34px;border-radius:10px;background:linear-gradient(150deg,var(--or2),var(--or));display:flex;align-items:center;justify-content:center;\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 13c1.6 0 1.6-2 3.2-2s1.6 2 3.2 2 1.6-2 3.2-2 1.6 2 3.2 2\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"12\" cy=\"6.4\" r=\"1.5\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fspan>\n        <span style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:19px;color:#fff;\">Zalpan<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:13px;color:#8A8072;\">A <a href=\"Bohniman AI.dc.html\" style=\"color:var(--or2);text-decoration:none;font-weight:600;\">Bohniman<\u002Fa> product · Restaurant Operating System<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() { return {}; }\n\n  componentDidMount() {\n    this.buildComparison();\n    this.buildFaq();\n    this.buildAiCards();\n    this.setupResponsiveNav();\n    this.setupTabs();\n    // Defer style-mutating setups until after the runtime's initial post-mount\n    // commit, which otherwise re-applies the template's inline opacity:0.\n    this._defer = setTimeout(() => {\n      this.setupReveal();\n      this.setupFloat();\n      this.setupWorkflow();\n    }, 90);\n  }\n\n  componentWillUnmount() {\n    if (this._revScroll) window.removeEventListener('scroll', this._revScroll);\n    if (this._wfScroll) window.removeEventListener('scroll', this._wfScroll);\n    if (this._revSafety) clearTimeout(this._revSafety);\n    if (this._wfSafety) clearTimeout(this._wfSafety);\n    if (this._aiTimer) clearInterval(this._aiTimer);\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n    if (this._onMove) { const s = document.querySelector('[data-hero-stage]'); if (s) s.removeEventListener('mousemove', this._onMove); }\n    if (this._defer) clearTimeout(this._defer);\n  }\n\n  root() { return document.getElementById('zalpan'); }\n\n  setupReveal() {\n    const reveals = Array.from(this.root().querySelectorAll('[data-reveal]'));\n    const check = () => {\n      const vh = window.innerHeight;\n      for (let i = reveals.length - 1; i >= 0; i--) {\n        const el = reveals[i];\n        const r = el.getBoundingClientRect();\n        if (r.top < vh * 0.9 && r.bottom > 0) {\n          el.style.opacity = '1'; el.style.transform = 'none';\n          reveals.splice(i, 1);\n        }\n      }\n      if (!reveals.length && this._revScroll) window.removeEventListener('scroll', this._revScroll);\n    };\n    this._revScroll = check;\n    window.addEventListener('scroll', check, { passive: true });\n    check();\n    // safety: nothing should ever stay invisible even if geometry checks fail\n    this._revSafety = setTimeout(() => { reveals.forEach((el) => { el.style.opacity = '1'; el.style.transform = 'none'; }); }, 2600);\n  }\n\n  setupResponsiveNav() {\n    const apply = () => {\n      const wide = window.innerWidth >= 860;\n      const nav = this.root().querySelector('[data-navlinks]');\n      if (nav) nav.style.display = wide ? 'flex' : 'none';\n      this.root().querySelectorAll('[data-showsm]').forEach((b) => { b.style.display = wide ? 'inline-flex' : 'none'; });\n    };\n    apply();\n    this._onResize = apply;\n    window.addEventListener('resize', apply);\n  }\n\n  setupFloat() {\n    const stage = this.root().querySelector('[data-hero-stage]');\n    const tilt = this.root().querySelector('[data-hero-tilt]');\n    const floats = Array.from(this.root().querySelectorAll('[data-float]'));\n    // parallax scroll\n    this._onScroll = () => {\n      const vh = window.innerHeight;\n      floats.forEach((el) => {\n        const depth = parseFloat(el.getAttribute('data-depth') || '30') / 100;\n        const r = el.getBoundingClientRect();\n        const center = r.top + r.height / 2;\n        const off = (center - vh / 2) / vh;   // -0.5..0.5-ish\n        el.style.setProperty('--pscroll', (off * depth * -46).toFixed(1) + 'px');\n        el.style.transform = 'translate3d(0,' + (off * depth * -46).toFixed(1) + 'px,0)';\n      });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n    // mouse tilt on hero\n    if (stage && tilt) {\n      this._onMove = (e) => {\n        const r = stage.getBoundingClientRect();\n        const px = (e.clientX - r.left) / r.width - 0.5;\n        const py = (e.clientY - r.top) / r.height - 0.5;\n        tilt.style.transform = 'rotateY(' + (px * 10).toFixed(2) + 'deg) rotateX(' + (-py * 10).toFixed(2) + 'deg)';\n      };\n      stage.addEventListener('mousemove', this._onMove);\n      stage.addEventListener('mouseleave', () => { tilt.style.transform = 'rotateY(0) rotateX(0)'; });\n    }\n  }\n\n  oWrap(anim, inner) {\n    return `<svg aria-hidden=\"true\" viewBox=\"0 0 200 200\" style=\"width:100%;animation:${anim} ease-in-out infinite;overflow:visible;\"><g filter=\"url(#claySoft)\">${inner}<\u002Fg><\u002Fsvg>`;\n  }\n  oBilling() {\n    return this.oWrap('zFloat 6.5s', '<rect x=\"56\" y=\"30\" width=\"84\" height=\"122\" rx=\"14\" fill=\"url(#clayPu 'Vendor purchase orders', false, true], ['CRM & loyalty', false, true],\n      ['Multi-outlet control', false, true], ['AI forecasting', false, true],\n      ['Owner analytics', 'basic', true], ['Staff roles', false, true]\n    ];\n    const yes = '<span style=\"color:#3F7A55;font-weight:700;font-size:16px;\">&#10003;<\u002Fspan>';\n    const no = '<span style=\"color:#C9BFB0;font-size:18px;\">&minus;<\u002Fspan>';\n    const basic = '<span style=\"font-size:11px;color:#B0A695;font-family:\\'IBM Plex Mono\\';\">basic<\u002Fspan>';\n    const el = this.root().querySelector('[data-cmp-body]');\n    el.innerHTML = rows.map((r, i) => {\n      const bg = i % 2 ? 'rgba(231,221,201,0.28)' : 'transparent';\n      const trad = r[1] === true ? yes : (r[1] === 'basic' ? basic : no);\n      return '<div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr;border-top:1px solid var(--line);background:' + bg + ';\">'\n        + '<div style=\"padding:15px 22px;font-size:14px;font-weight:500;color:#191512;\">' + r[0] + '<\u002Fdiv>'\n        + '<div style=\"padding:15px 22px;text-align:center;\">' + trad + '<\u002Fdiv>'\n        + '<div style=\"padding:15px 22px;text-align:center;background:rgba(240,83,28,0.05);\">' + yes + '<\u002Fdiv>'\n        + '<\u002Fdiv>';\n    }).join('');\n  }\n\n  buildFaq() {\n    const faqs = [\n      ['Does it work for Indian restaurants?', 'Yes. Zalpan is built for Indian F&B \\u2014 GST-ready invoicing, UPI and digital payments, regional menu structures, and workflows that match how restaurants here actually run.'],\n      ['Can it run on Android tablets?', 'Absolutely. The counter POS and kitchen display run on standard Android devices, alongside the web portal and an owner mobile app.'],\n      ['Does it support QR ordering?', 'Yes. Guests scan a table QR, browse a live menu, order and pay \\u2014 orders flow straight into the POS and kitchen with no manual re-entry.'],\n      ['Can it work if the internet is unstable?', 'Zalpan is designed to keep billing and KOTs running through patchy connectivity, syncing automatically once the connection is back.'],\n      ['Does it support inventory and purchase orders?', 'Yes. Recipe-linked inventory updates with every sale, and you can raise purchase orders and manage vendors from the same ledger.'],\n      ['Can I manage multiple outlets?', 'Yes. Central menus, pricing, inventory and consolidated analytics let you run many outlets \\u2014 including cruise vessel kitchens \\u2014 from one dashboard.'],\n      ['Does it include AI forecasting?', 'AI forecasting for demand, stock, peak hours and menu performance is available on higher plans as your restaurant\\u2019s co-pilot.'],\n      ['Can it integrate with payment systems?', 'Yes. Zalpan supports UPI and major digital payment methods, and can integrate with payment and third-party systems for enterprise setups.']\n    ];\n    const el = this.root().querySelector('[data-faq-list]');\n    el.innerHTML = faqs.map((f, i) =>\n      '<div data-faq-item style=\"border-bottom:1px solid var(--line);\">'\n      + '<button data-faq-q style=\"cursor:pointer;width:100%;text-align:left;background:none;border:none;font-family:inherit;padding:22px 4px;display:flex;align-items:center;justify-content:space-between;gap:16px;\">'\n      + '<span style=\"font-weight:600;font-size:clamp(15px,1.7vw,18px);color:#191512;\">' + f[0] + '<\u002Fspan>'\n      + '<span data-faq-icon style=\"flex:0 0 auto;width:26px;height:26px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;color:#F0531C;transition:transform .25s,background .2s;\">+<\u002Fspan>'\n      + '<\u002Fbutton>'\n      + '<div data-faq-a style=\"max-height:0;overflow:hidden;transition:max-height .3s ease;\"><p style=\"margin:0;padding:0 4px 24px;font-size:15px;line-height:1.62;color:#6E6558;max-width:64ch;\">' + f[1] + '<\u002Fp><\u002Fdiv>'\n      + '<\u002Fdiv>'\n    ).join('');\n    el.querySelectorAll('[data-faq-item]').forEach((item) => {\n      const btn = item.querySelector('[data-faq-q]');\n      const ans = item.querySelector('[data-faq-a]');\n      const icon = item.querySelector('[data-faq-icon]');\n      btn.addEventListener('click', () => {\n        const open = ans.style.maxHeight && ans.style.maxHeight !== '0px';\n        el.querySelectorAll('[data-faq-a]').forEach((a) => { a.style.maxHeight = '0px'; });\n        el.querySelectorAll('[data-faq-icon]').forEach((ic) => { ic.style.transform = 'rotate(0)'; ic.textContent = '+'; ic.style.background = 'transparent'; ic.style.color = '#F0531C'; });\n        if (!open) { ans.style.maxHeight = ans.scrollHeight + 'px'; icon.style.transform = 'rotate(45deg)'; icon.style.background = '#F0531C'; icon.style.color = '#fff'; }\n      });\n    });\n  }\n\n  buildAiCards() {\n    this._ai = [\n      ['Inventory', 'Paneer stock may run low by Friday evening.'],\n      ['Rush hour', 'Peak predicted today: 7:30 PM \\u2013 9:15 PM.'],\n      ['Menu', 'Butter Chicken sales are up 34% this week.'],\n      ['Staffing', 'You may be short-staffed for Saturday dinner.'],\n      ['Cost', 'Food cost increased 8% versus last week.']\n    ];\n    this._aiIdx = 0;\n    const stack = this.root().querySelector('#aiStack');\n    const render = () => {\n      stack.innerHTML = this._ai.map((c, i) => {\n        const active = i === this._aiIdx;\n        return '<div style=\"display:flex;align-items:flex-start;gap:14px;background:' + (active ? 'linear-gradient(150deg,#FFFDF8,#FDF3E8)' : 'var(--paper)') + ';border:1px solid ' + (active ? 'rgba(240,83,28,0.5)' : 'var(--line)') + ';border-radius:14px;padding:18px;transition:all .4s;transform:scale(' + (active ? '1.03' : '1') + ');box-shadow:' + (active ? '0 20px 40px -24px rgba(240,83,28,0.55)' : 'none') + ';\">'\n          + '<span style=\"width:34px;height:34px;flex:0 0 auto;border-radius:9px;background:' + (active ? 'linear-gradient(150deg,#FF7C36,#F0531C)' : 'rgba(240,83,28,0.12)') + ';display:flex;align-items:center;justify-content:center;\">'\n          + '<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2\" stroke=\"' + (active ? '#fff' : '#F0531C') + '\" stroke-width=\"1.8\" stroke-linecap=\"round\"/><circle cx=\"12\" cy=\"12\" r=\"3.2\" stroke=\"' + (active ? '#fff' : '#F0531C') + '\" stroke-width=\"1.8\"/><\u002Fsvg><\u002Fspan>'\n          + '<div><div style=\"font-family:\\'IBM Plex Mono\\';font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#B8431A;margin-bottom:4px;\">' + c[0] + '<\u002Fdiv>'\n          + '<div style=\"font-size:14.5px;font-weight:600;color:#191512;line-height:1.4;\">' + c[1] + '<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n      }).join('');\n    };\n    render();\n    this._aiTimer = setInterval(() => { this._aiIdx = (this._aiIdx + 1) % this._ai.length; render(); }, 2600);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
